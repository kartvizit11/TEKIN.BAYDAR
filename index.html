    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Modern ve Karanlık Tasarım */
        body { 
            background-color: #000000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card { 
            background: #121212; 
            padding: 40px 30px; 
            border-radius: 30px; 
            text-align: center; 
            width: 300px; 
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h1 { color: #ffffff; margin: 0 0 5px; font-size: 24px; font-weight: 700; }
        p { color: #888888; margin-bottom: 30px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Canlı Buton Tasarımı */
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #e0e0e0; /* Açık Gri */
            color: #000000; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Buton Canlandırma (Hover Efekti) */
        .btn:hover { 
            background: #ffffff; 
            transform: scale(1.05); /* Hafif Büyüme */
            box-shadow: 0 8px 25px rgba(255,255,255,0.2);
        }
        .btn:active { transform: scale(0.95); } /* Tıklama Hissi */

        .btn i { margin-right: 12px; font-size: 20px; width: 25px; text-align: center; }
        
        /* Özel İkon Renkleri (Hover durumunda canlanması için) */
        .btn:hover .fa-whatsapp { color: #25D366; }
        .btn:hover .fa-instagram { color: #E1306C; }
        .btn:hover .fa-facebook { color: #1877F2; }
        .btn:hover .fa-globe { color: #007bff; }
    </style>
</head>
